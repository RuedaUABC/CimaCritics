<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario - CimaCritics</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        header { display: flex; justify-content: space-between; align-items: center; background-color: #333; color: white; padding: 10px 20px; }
        .profile-info { margin: 20px 0; }
        .reviews { margin-top: 20px; }
        .review { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; background-color: white; }
        .review-actions { margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>CimaCritics</h1>
        <nav>
            <a href="#" style="color: white; margin-right: 10px;">Mi Perfil</a>
            <a href="#" style="color: white;">Logout</a>
        </nav>
    </header>
    
    <main>
        <div class="profile-info">
            <h2>Perfil de: Nombre Usuario</h2>
            <p><strong>Miembro desde:</strong> Enero 2024</p>
            <p><strong>Reseñas escritas:</strong> 15</p>
        </div>
        
        <div class="reviews">
            <h3>Mis Reseñas Recientes:</h3>
            <div class="review">
                <h4>Cómic 1 ★★★★★</h4>
                <p>Excelente historia...</p>
                <div class="review-actions">
                    <button>Editar</button>
                    <button>Eliminar</button>
                </div>
            </div>
            <button>Ver todas mis reseñas</button>
        </div>
    </main>
</body>
</html>
