<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario - CimaCritics</title>
    <style>
        :root{--page-bg:#2b2b2b;--card:#fff;--muted:#444;--text:#111}
        body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background-color: var(--page-bg); color:var(--text);}
        header { display:flex;justify-content:space-between;align-items:center;background:transparent;color:#fff;padding:12px 16px }
        header a{color:#fff;filter:grayscale(100%);text-decoration:none;margin-right:12px}
        .container{max-width:900px;margin:18px auto}
        .profile-info{margin:20px 0;color:#000}
        .reviews{margin-top:20px}
        .review{border:1px solid #999;padding:10px;margin-bottom:10px;background:#fff}
        .review-actions{margin-top:10px}
        button{background:#fff;color:#000;border:1px solid #999;padding:6px 10px;border-radius:4px}
    </style>
</head>
<body>
    <header>
        <h1>CimaCritics</h1>
        <nav>
            <a href="#">Mi Perfil</a>
            <a href="#">Logout</a>
        </nav>
    </header>
    
    <main>
        <div class="profile-info">
            <h2>Perfil de: Nombre Usuario</h2>
            <p><strong>Miembro desde:</strong> Enero 2024</p>
            <p><strong>Reseñas escritas:</strong> 15</p>
        </div>
        
        <div class="reviews">
            <h3>Mis Reseñas Recientes:</h3>
            <div class="review">
                <h4>Cómic 1 ★★★★★</h4>
                <p>Excelente historia...</p>
                <div class="review-actions">
                    <button>Editar</button>
                    <button>Eliminar</button>
                </div>
            </div>
            <button>Ver todas mis reseñas</button>
        </div>
    </main>
</body>
</html>
