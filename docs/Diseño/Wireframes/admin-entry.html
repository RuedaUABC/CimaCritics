<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Agregar Cómic</title>
    <style>
        :root{--page-bg:#2b2b2b;--card:#fff;--muted:#444;--text:#111}
        body{font-family:Arial,sans-serif;margin:0;padding:16px;background:var(--page-bg);color:var(--text)}
        header{display:flex;justify-content:center;padding:12px 0}
        header h1{color:#fff}
        .container{max-width:600px;margin:24px auto;background:#fff;padding:24px;border:1px solid #999;border-radius:8px}
        label{display:block;margin-bottom:8px;color:#000}
        .multi-input{display:flex;gap:4px;align-items:center;margin-bottom:16px}
        .multi-input input{flex:1}
        .add-btn{width:32px;height:32px;border:1px solid #999;border-radius:4px;background:#fff;color:#000;font-size:20px;line-height:20px;cursor:pointer}
        input[type=text],input[type=number],textarea,select{width:100%;padding:10px;border:1px solid #999;border-radius:4px;margin-bottom:16px}
        button{padding:10px 16px;border:1px solid #999;border-radius:4px;background:#fff;color:#000}
    </style>
</head>
<body>
    <header><h1>Agregar/Editar Cómic</h1></header>
    <main>
        <div class="container">
            <form>
                <label for="title">Título</label>
                <input type="text" id="title" name="title">

                <label>Escritor(es)</label>
                <div class="multi-input">
                    <input type="text" name="writers[]" placeholder="Nombre del escritor">
                    <button type="button" class="add-btn">+</button>
                </div>

                <label>Dibujante(s)</label>
                <div class="multi-input">
                    <input type="text" name="artists[]" placeholder="Nombre del dibujante">
                    <button type="button" class="add-btn">+</button>
                </div>

                <label>Editorial(es)</label>
                <div class="multi-input">
                    <input type="text" name="publishers[]" placeholder="Nombre de la editorial">
                    <button type="button" class="add-btn">+</button>
                </div>

                <label for="year">Año</label>
                <input type="number" id="year" name="year">

                <label for="genre">Género</label>
                <input type="text" id="genre" name="genre">

                <label for="cover">Portada URL</label>
                <input type="text" id="cover" name="cover">

                <label for="description">Descripción</label>
                <textarea id="description" name="description" rows="4"></textarea>

                <button type="submit">Guardar</button>
                <button type="button">Cancelar</button>
            </form>
        </div>
    </main>
</body>
</html>
