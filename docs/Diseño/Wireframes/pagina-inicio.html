<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Inicio - CimaCritics</title>
    <style>
        :root{--page-bg:#2b2b2b;--card:#fff;--muted:#444;--text:#111}
        body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background-color: var(--page-bg); color:var(--text);}
        header { display:flex;justify-content:space-between;align-items:center;background:transparent;color:#fff;padding:12px 16px }
        header a{color:#fff;filter:grayscale(100%);text-decoration:none;margin-right:12px}
        .container{max-width:1100px;margin:18px auto}
        .search { margin: 20px 0; display:flex;gap:8px }
        .search input { flex:1;padding:10px;border:1px solid #999;border-radius:6px;background:#fff;color:#000 }
        .search button { padding: 10px;border:1px solid #999;border-radius:6px;background:#fff;color:#000 }
        .featured { display: grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-top:20px }
        .comic-card { border:1px solid #999; padding:10px; background-color:#fff; width:200px; text-align:center;}
        .comic-card .cover{width:100%;background:#fff;border:2px dashed #999;aspect-ratio:8.5/11;display:flex;align-items:center;justify-content:center}
        .comic-card .cover span{color:#999;font-size:0.9rem}
        .comic-card h4{margin:8px 0 4px;color:#000}
        .comic-card p{margin:0;color:#444}
        button{background:#fff;color:#000;border:1px solid #999;padding:6px 10px;border-radius:4px}
    </style>
</head>
<body>
    <header>
        <h1>CimaCritics</h1>
        <nav>
            <a href="#">Login</a>
            <a href="#">Registro</a>
        </nav>
    </header>
    
    <main>
        <h2>¡Bienvenido a CimaCritics!</h2>
        <p>Descubre y comparte reseñas de cómics</p>
        
        <div class="search">
            <input type="text" placeholder="Buscar cómics...">
            <button>🔍</button>
        </div>
        
        <h3>Cómics Destacados:</h3>
        <div class="featured">
            <div class="comic-card">
                <div class="cover" aria-hidden="true"><span style="color:#999;font-size:0.9rem">Portada (tamaño carta)</span></div>
                <h4>Cómic 1</h4>
                <p>★★★★☆ (4.2)</p>
            </div>
            <div class="comic-card">
                <div class="cover" aria-hidden="true"><span style="color:#999;font-size:0.9rem">Portada (tamaño carta)</span></div>
                <h4>Cómic 2</h4>
                <p>★★★★☆ (4.1)</p>
            </div>
            <div class="comic-card">
                <div class="cover" aria-hidden="true"><span style="color:#999;font-size:0.9rem">Portada (tamaño carta)</span></div>
                <h4>Cómic 3</h4>
                <p>★★★★☆ (4.0)</p>
            </div>
        </div>
    </main>
</body>
</html>
